name: codeql
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 7 * * 1'  # Mondays 07:17 UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [python]
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          # CodeQL's allowlist is smaller than ci.yml's because there is
          # no `pip install` step — the CodeQL bundle ships its own
          # Python extractor. Hosts:
          #   - stepsecurity.io endpoints   : harden-runner telemetry
          #   - api.github.com              : SARIF upload (code-scanning API)
          #   - github.com / codeload.github.com : actions/checkout + CodeQL bundle release-page redirect
          #   - objects.githubusercontent.com    : CodeQL bundle blob storage
          #   - release-assets.githubusercontent.com : CodeQL bundle CDN
          #     (release-asset downloads 302 from github.com to this
          #     AWS-backed CDN; needed when runner toolcache lacks the
          #     requested bundle version — the warm-cache hit on PR #49
          #     masked this miss, but PR #50's runner caught it)
          #   - results-receiver.actions.githubusercontent.com : actions cache/artifacts
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            api.github.com:443
            codeload.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            prod.app-api.stepsecurity.io:443
            release-assets.githubusercontent.com:443
            results-receiver.actions.githubusercontent.com:443
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
