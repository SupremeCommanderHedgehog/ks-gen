name: sbom
on:
  release:
    types: [published]

permissions:
  contents: write  # required to upload a release asset

jobs:
  cyclonedx:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
      - name: Install ks-gen and CycloneDX
        run: |
          pip install -e .
          pip install cyclonedx-bom==4.6.1
      - name: Generate SBOM (CycloneDX JSON)
        run: |
          cyclonedx-py environment \
            --of json \
            -o sbom-${{ github.event.release.tag_name }}.cdx.json
      - name: Attach SBOM to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: sbom-${{ github.event.release.tag_name }}.cdx.json
