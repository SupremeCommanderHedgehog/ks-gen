name: sbom
on:
  release:
    types: [published]

permissions:
  contents: write  # required to upload a release asset

jobs:
  cyclonedx:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.4
        with:
          egress-policy: audit
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.13"
          cache: pip
      - name: Install ks-gen and CycloneDX
        run: |
          pip install -e .
          pip install cyclonedx-bom==4.6.1
      - name: Generate SBOM (CycloneDX JSON)
        run: |
          cyclonedx-py environment \
            --of json \
            -o sbom-${{ github.event.release.tag_name }}.cdx.json
      - name: Attach SBOM to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: sbom-${{ github.event.release.tag_name }}.cdx.json
