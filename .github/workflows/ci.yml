name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# step-security/harden-runner runs in `audit` mode below — it logs every
# egress from the runner but does not block anything. The going-public
# runbook (docs/going-public.md) covers flipping to `block` once we have
# a baseline of expected egress destinations.

jobs:
  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      actions: none
      checks: none
      id-token: none
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
      # Install via [dev] so this job uses the same ruff version
      # pyproject.toml pins for the matrix `test` job — no version skew.
      - name: Install dev extras
        run: pip install -e ".[dev]"
      - name: ruff check
        run: ruff check src tests
      - name: ruff format --check
        run: ruff format --check src tests

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: none
      checks: none
      id-token: none
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Type check (mypy)
        run: mypy
      - name: Test (pytest)
        run: pytest -q
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pytest-artifacts-${{ matrix.python }}
          path: |
            tests/__snapshots__/**
            tests/golden/__snapshots__/**
          if-no-files-found: ignore
          retention-days: 7
