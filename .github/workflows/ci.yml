name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# step-security/harden-runner runs in `audit` mode below — it logs every
# egress from the runner but does not block anything. The going-public
# runbook (docs/going-public.md) covers flipping to `block` once we have
# a baseline of expected egress destinations.

jobs:
  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      actions: none
      checks: none
      id-token: none
    steps:
      - uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.4
        with:
          egress-policy: audit
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.13"
          cache: pip
      # Install via [dev] so this job uses the same ruff version
      # pyproject.toml pins for the matrix `test` job — no version skew.
      - name: Install dev extras
        run: pip install -e ".[dev]"
      - name: ruff check
        run: ruff check src tests
      - name: ruff format --check
        run: ruff format --check src tests

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: none
      checks: none
      id-token: none
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.4
        with:
          egress-policy: audit
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Type check (mypy)
        run: mypy
      - name: Test (pytest)
        run: pytest -q
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: pytest-artifacts-${{ matrix.python }}
          path: |
            tests/__snapshots__/**
            tests/golden/__snapshots__/**
          if-no-files-found: ignore
          retention-days: 7
