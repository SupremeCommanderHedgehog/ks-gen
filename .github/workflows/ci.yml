name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# step-security/harden-runner runs in `block` mode below — outbound
# traffic is restricted to the explicit allowlist per job. The allowlist
# was derived from what each step actually needs:
#   - stepsecurity.io endpoints   : harden-runner telemetry
#   - github.com / api.github.com : actions/checkout
#   - codeload.github.com         : actions/checkout tarball fallback
#   - objects.githubusercontent.com : setup-python binary download
#   - pypi.org / files.pythonhosted.org : pip install
#   - results-receiver.actions.githubusercontent.com : actions cache + upload-artifact
# If a step fails because a host isn't allowlisted, add it here.
# codeql.yml and release-please.yml still run in audit mode — they have
# wider network needs and can be tightened separately.

jobs:
  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      actions: none
      checks: none
      id-token: none
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            api.github.com:443
            codeload.github.com:443
            files.pythonhosted.org:443
            github.com:443
            objects.githubusercontent.com:443
            prod.app-api.stepsecurity.io:443
            pypi.org:443
            results-receiver.actions.githubusercontent.com:443
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      # Install via [dev] so this job uses the same ruff version
      # pyproject.toml pins for the matrix `test` job — no version skew.
      - name: Install dev extras
        run: pip install -e ".[dev]"
      - name: ruff check
        run: ruff check src tests
      - name: ruff format --check
        run: ruff format --check src tests

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: none
      checks: none
      id-token: none
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            api.github.com:443
            codeload.github.com:443
            files.pythonhosted.org:443
            github.com:443
            objects.githubusercontent.com:443
            prod.app-api.stepsecurity.io:443
            pypi.org:443
            results-receiver.actions.githubusercontent.com:443
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Type check (mypy)
        run: mypy
      - name: Test (pytest)
        run: pytest -q
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pytest-artifacts-${{ matrix.python }}
          path: |
            tests/__snapshots__/**
            tests/golden/__snapshots__/**
          if-no-files-found: ignore
          retention-days: 7
