name: release-please
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          # release-please-action talks to GitHub's REST API to query
          # commits, manage release PRs, and create releases — that's
          # all api.github.com. github.com is added defensively in
          # case the action ever fetches raw content (its v5 path is
          # API-only today). No pip/npm endpoints — the JS action is
          # pre-bundled.
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            api.github.com:443
            github.com:443
            prod.app-api.stepsecurity.io:443
            results-receiver.actions.githubusercontent.com:443
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  sbom:
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          # sbom job needs the full pip + checkout + release-upload set.
          # Mirrors ci.yml's 9-endpoint baseline plus uploads.github.com
          # for softprops/action-gh-release's asset upload (the SBOM
          # JSON file goes through the uploads host, not api.github.com).
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            api.github.com:443
            codeload.github.com:443
            files.pythonhosted.org:443
            github.com:443
            objects.githubusercontent.com:443
            prod.app-api.stepsecurity.io:443
            pypi.org:443
            results-receiver.actions.githubusercontent.com:443
            uploads.github.com:443
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release.outputs.tag_name }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
      - name: Install ks-gen and CycloneDX
        run: |
          pip install -e .
          pip install cyclonedx-bom==4.6.1
      - name: Generate SBOM (CycloneDX JSON)
        run: |
          cyclonedx-py environment \
            --of json \
            -o sbom-${{ needs.release.outputs.tag_name }}.cdx.json
      - name: Attach SBOM to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.release.outputs.tag_name }}
          files: sbom-${{ needs.release.outputs.tag_name }}.cdx.json
