default vesamenu.c32
timeout 600
display boot.msg

menu background splash.png
menu title AlmaLinux 8.10
menu vshift 8
menu rows 18
menu margin 8

label linux
  menu label ^Install AlmaLinux 8.10
  menu default
  kernel vmlinuz
  append initrd=initrd.img inst.stage2=hd:LABEL=AlmaLinux-8-10-x86_64-dvd quiet

label check
  menu label Test this ^media & install AlmaLinux 8.10
  kernel vmlinuz
  append initrd=initrd.img inst.stage2=hd:LABEL=AlmaLinux-8-10-x86_64-dvd rd.live.check quiet

menu separator

label rescue
  menu label ^Rescue an AlmaLinux system
  kernel vmlinuz
  append initrd=initrd.img inst.stage2=hd:LABEL=AlmaLinux-8-10-x86_64-dvd rescue
