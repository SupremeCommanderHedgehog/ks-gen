system:
  hostname: wipe-only.example.com
user:
  admin:
    name: opsadmin
    authorized_keys:
      - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAITESTKEYwipe ops@bastion"
    sudo: nopasswd_yes
disk:
  target: sda
  preset: stig_server
  data_disks:
    - target: sdb
      mount: /data
      fstype: xfs
      wipe: true
